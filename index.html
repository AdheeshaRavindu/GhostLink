<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostLink - URL Security Intelligence Scanner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="title">🔗 GhostLink</h1>
                <p class="subtitle">URL Security Intelligence Scanner</p>
            </div>
        </header>

        <!-- Main Dashboard -->
        <main class="dashboard">
            <!-- Input Section -->
            <section class="input-section">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="urlInput" 
                        class="url-input" 
                        placeholder="Enter URL to analyze..."
                        aria-label="URL input"
                    >
                    <button id="analyzeBtn" class="analyze-btn">Analyze</button>
                </div>
            </section>

            <!-- Results Section -->
            <section class="results-section" id="resultsSection" style="display: none;">
                <!-- Score Display -->
                <div class="score-card">
                    <div class="score-header">Security Score</div>
                    <div class="score-display">
                        <div class="score-value" id="scoreValue">0</div>
                        <div class="score-max">/100</div>
                    </div>
                    <div class="risk-badge" id="riskBadge" data-level="low">Low</div>
                </div>

                <!-- Findings Section -->
                <div class="findings-card">
                    <div class="findings-header">Findings</div>
                    <div class="findings-list" id="findingsList">
                        <!-- Dynamically populated -->
                    </div>
                </div>
            </section>

            <!-- Loading Spinner -->
            <div class="loading" id="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Analyzing URL...</p>
            </div>

            <!-- Error Message -->
            <div class="error-message" id="errorMessage" style="display: none;"></div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
